<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gombro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
  gap: 2rem;
}
.video-wrap {
  width: min(480px, 90vw);
}
video {
  width: 100%;
  border-radius: 6px;
  display: block;
}
.typewriter-wrap {
  text-align: center;
  min-height: 3rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
#tw {
  font-size: clamp(1rem, 3vw, 1.4rem);
  letter-spacing: 0.04em;
  color: #e0d4b0;
}
#cursor {
  display: inline-block;
  width: 2px;
  height: 1.2em;
  background: #e0d4b0;
  margin-left: 3px;
  vertical-align: middle;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>
<body>

<div class="video-wrap">
  <video autoplay loop muted playsinline>
    <source src="media/video-landing-pevio.mp4" type="video/mp4" />
  </video>
</div>

<div class="typewriter-wrap">
  <span id="tw"></span><span id="cursor"></span>
</div>

<script>
const phrases = [
  "We're building the editor of your dreams.",
  "Pracujemy nad edytorem twoich marzeń.",
  "Estamos trabajando en el editor de tus sueños.",
  "We're pracujemy en el editor of twoich dreams sueños."
];

const el = document.getElementById('tw');
let phraseIndex = 0;
let charIndex = 0;
let deleting = false;
const SPEED_TYPE = 45;
const SPEED_DELETE = 20;
const PAUSE_END = 2200;
const PAUSE_START = 400;

function tick() {
  const phrase = phrases[phraseIndex];

  if (!deleting) {
    el.textContent = phrase.slice(0, charIndex + 1);
    charIndex++;
    if (charIndex === phrase.length) {
      deleting = true;
      setTimeout(tick, PAUSE_END);
      return;
    }
    setTimeout(tick, SPEED_TYPE);
  } else {
    el.textContent = phrase.slice(0, charIndex - 1);
    charIndex--;
    if (charIndex === 0) {
      deleting = false;
      phraseIndex = (phraseIndex + 1) % phrases.length;
      setTimeout(tick, PAUSE_START);
      return;
    }
    setTimeout(tick, SPEED_DELETE);
  }
}

tick();
</script>
</body>
</html>
