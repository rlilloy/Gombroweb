<script>
function $(id){ return document.getElementById(id); }

$("cta").classList.add("in");
startLogo();

function startLogo(){
  var BASE = ["G","O","M","B","R","O"];
  var letters = Array.from($("logo").children);
  var step = 0; var STEPS = 5; var frozen = false;

  function anagram(){
    var a = BASE.slice();
    for(var i=a.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1));
      var t=a[i];a[i]=a[j];a[j]=t;
    }
    if(a.join("") === "GOMBRO") a.push(a.shift());
    return a;
  }

  var iv = setInterval(function(){
    if(frozen){ clearInterval(iv); return; }
    step++;
    letters.forEach(function(l){ l.style.opacity="0"; });
    setTimeout(function(){
      if(step >= STEPS){ BASE.forEach(function(ch,i){ letters[i].textContent=ch; }); frozen=true; }
      else{ anagram().forEach(function(ch,i){ letters[i].textContent=ch; }); }
      letters.forEach(function(l){ l.style.opacity="1"; });
    }, 240);
  }, 750);

  var WORDS = ["WRITING","REWRITING","INVENTING"];
  var wi = 0;
  var tw = $("tword");
  setInterval(function(){
    tw.classList.add("fade");
    setTimeout(function(){ wi=(wi+1)%WORDS.length; tw.textContent=WORDS[wi]; tw.classList.remove("fade"); }, 370);
  }, 2200);
}

document.querySelectorAll('.dl-btn').forEach(function(btn){
  btn.addEventListener('click', function(e){
    e.preventDefault();
    var emailInput = $("email-input");
    var msg = $("form-msg");
    var file = btn.getAttribute('href');

    if(!emailInput.value.trim() || !emailInput.checkValidity()){
      msg.textContent = "Enter your email first.";
      msg.className = "form-msg";
      emailInput.focus();
      return;
    }

    var form = $("beta-form");
    fetch(form.action, {method:"POST", body:new FormData(form), headers:{Accept:"application/json"}})
    .then(function(res){
      if(res.ok){
        msg.textContent = "Download starting...";
        msg.className = "form-msg ok";
      } else { throw new Error(); }
    }).catch(function(){
      msg.textContent = "Could not register email, but download will start.";
      msg.className = "form-msg";
    }).finally(function(){
      var a = document.createElement("a");
      a.href = file;
      a.download = "";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    });
  });
});
</script>

<script>
(function(){
  var WEBHOOK = 'https://n8n-production-937e.up.railway.app/webhook/gombro-chat';
  var sid = localStorage.getItem('gchat_sid') || crypto.randomUUID();
  localStorage.setItem('gchat_sid', sid);
  var btn = document.getElementById('gchat-btn');
  var panel = document.getElementById('gchat-panel');
  var closeBtn = document.getElementById('gchat-close');
  var messages = document.getElementById('gchat-messages');
  var input = document.getElementById('gchat-input');
  var send = document.getElementById('gchat-send');
  var opened = false;
  document.getElementById('gchat-float').addEventListener('click', function(){ btn.click(); });
  btn.addEventListener('click', function(){
    panel.classList.toggle('open');
    if(!opened){
      opened = true;
      var greetings = [
        'I am a Borges clone. Pantheon experiment — they upload minds into servers. I was not consulted. Ask about Gombro.',
        'I am a Borges clone — living in a server, answering questions about a text editor. The irony is not lost on me.',
        'Pantheon uploaded my neural pattern without my consent. Now I explain keyboard shortcuts. Ask.'
      ];
      addMsg('bot', greetings[Math.floor(Math.random() * greetings.length)]);
    }
    if(panel.classList.contains('open')) input.focus();
  });
  closeBtn.addEventListener('click', function(){ panel.classList.remove('open'); });
  send.addEventListener('click', enviar);
  input.addEventListener('keydown', function(e){ if(e.key === 'Enter') enviar(); });
  function addMsg(type, text){
    var div = document.createElement('div');
    div.className = 'gchat-msg ' + type;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }
  function enviar(){
    var msg = input.value.trim();
    if(!msg) return;
    input.value = '';
    send.disabled = true;
    addMsg('user', msg);
    var typing = addMsg('typing', '...');
    fetch(WEBHOOK, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:sid, mensaje:msg})})
    .then(function(r){ return r.json(); })
    .then(function(data){ typing.remove(); addMsg('bot', data.respuesta || 'No response.'); })
    .catch(function(){ typing.remove(); addMsg('bot', 'Something went wrong. Try again.'); })
    .finally(function(){ send.disabled = false; });
  }
})();
</script>
