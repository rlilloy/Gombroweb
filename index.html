<style>

body{background:#000;color:#FCF5E5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk',monospace;cursor:crosshair}
@media(max-width:600px){body{padding:40px 0}}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

<body>
<div class="wrap">
  <div class="lang-bar">
    <button class="lang-btn active" data-lang="en">EN</button>
    <button class="lang-btn" data-lang="es">ES</button>
    <button class="lang-btn" data-lang="pl">PL</button>
  </div>
  <div class="logo">GOMBRO</div>
  <p class="tagline" id="tagline">Writing as invention</p>
  <div class="video-wrap">
    <img src="media/gombro.gif" alt="Gombro editor demo" />
  </div>
  <p class="copy" id="copy">No AI. No cloud. Paragraph-centered.<br/>For fiction, poetry, literary non-fiction.</p>
  <div class="buttons">
    <button class="btn" id="btn-dl" onclick="openDl()">Download &mdash; Windows &mdash; 60-day free trial</button>
    <p class="price" id="price-txt">USD 500 &mdash; lifetime license</p>
    <button class="btn btn-outline" id="btn-fb" onclick="openFb()">&#x1F41A; Bugs &amp; Suggestions</button>
    <a class="reddit" href="https://www.reddit.com/r/Gombro/" target="_blank" rel="noopener">r/Gombro</a>
  </div>
  <p class="footnote">No AI &nbsp;&middot;&nbsp; Local only &nbsp;&middot;&nbsp; No cloud</p>
</div>

<div id="dl-modal" onclick="closeDlOut(event)">
  <div class="modal-box">
    <p class="ml">Free trial &middot; Windows</p>
    <p class="mt">Download Gombro</p>
    <p class="ms">60-day free trial. No credit card.</p>
    <form id="dl-form" action="https://formspree.io/f/mjgjjpwk" method="POST" onsubmit="handleDl(event)">
      <input type="email" name="email" placeholder="your@email.com" required autocomplete="email" />
      <input type="hidden" name="_subject" value="Descarga" />
      <label class="chk"><input type="checkbox" name="updates" value="yes" checked />Receive Gombro updates</label>
      <button type="submit" class="btn" id="dl-submit">Download now</button>
    </form>
    <p class="modal-msg" id="dl-msg"></p>
    <button class="cancel" onclick="closeDl()">Cancel</button>
  </div>
</div>

<div id="fb-modal" onclick="closeFbOut(event)">
  <div class="modal-box">
    <p class="ml">Feedback</p>
    <p class="mt">Bugs &amp; Suggestions</p>
    <form id="fb-form" action="https://formspree.io/f/mjgjjpwk" method="POST" onsubmit="handleFb(event)">
      <div class="radios">
        <label><input type="radio" name="tipo" value="bug" required />Bug</label>
        <label><input type="radio" name="tipo" value="suggestion" />Suggestion</label>
      </div>
      <textarea name="mensaje" placeholder="Write here..." required></textarea>
      <input type="email" name="email" placeholder="your@email.com (optional)" />
      <input type="hidden" name="_subject" value="Feedback Gombro" />
      <button type="submit" class="btn" id="fb-submit">Send</button>
    </form>
    <p class="modal-msg" id="fb-msg"></p>
    <button class="cancel" onclick="closeFb()">Cancel</button>
  </div>
</div>

<script>
const i18n = {
  en: {
    tagline: 'Writing as invention',
    copy: 'No AI. No cloud. Paragraph-centered.<br/>For fiction, poetry, literary non-fiction.',
    dl: 'Download — Windows — Beta — 60-day free trial',
    price: 'USD 500 — lifetime license',
    fb: '🐚 Bugs & Suggestions',
    dlLabel: 'Free trial · Windows · Beta',
    dlTitle: 'Download Gombro',
    dlSub: '60-day free trial. No credit card.',
    dlCheck: 'Receive Gombro updates',
    dlBtn: 'Download now',
    fbLabel: 'Feedback',
    fbTitle: 'Bugs & Suggestions',
    cancel: 'Cancel',
    thanks: 'Thanks. I will read it.',
    err: 'Something went wrong. Try again.'
  },
  es: {
    tagline: 'La escritura como invención',
    copy: 'Sin IA. Sin nube. Centrado en el párrafo.<br/>Para ficción, poesía, no ficción literaria.',
    dl: 'Descargar — Windows — Beta — 60 días gratis',
    price: 'USD 500 — licencia de por vida',
    fb: '🐚 Bugs y sugerencias',
    dlLabel: 'Prueba gratuita · Windows · Beta',
    dlTitle: 'Descargar Gombro',
    dlSub: '60 días gratis. Sin tarjeta.',
    dlCheck: 'Recibir actualizaciones de Gombro',
    dlBtn: 'Descargar ahora',
    fbLabel: 'Feedback',
    fbTitle: 'Bugs y sugerencias',
    cancel: 'Cancelar',
    thanks: 'Gracias. Lo leo.',
    err: 'Algo falló. Intentá de nuevo.'
  },
  pl: {
    tagline: 'Pisanie jako wynalazek',
    copy: 'Bez AI. Bez chmury. Skupiony na akapicie.<br/>Do prozy, poezji i literatury faktu.',
    dl: 'Pobierz — Windows — Beta — 60 dni za darmo',
    price: 'USD 500 — licencja dożotywotnia',
    fb: '🐚 Błędy i sugestie',
    dlLabel: 'Wersja próbna · Windows · Beta',
    dlTitle: 'Pobierz Gombro',
    dlSub: '60 dni za darmo. Bez karty.',
    dlCheck: 'Otrzymuj aktualizacje Gombro',
    dlBtn: 'Pobierz teraz',
    fbLabel: 'Feedback',
    fbTitle: 'Błędy i sugestie',
    cancel: 'Anuluj',
    thanks: 'Dzięki. Przeczytam.',
    err: 'Coś poszło nie tak. Spróbuj ponownie.'
  }
};
function setLang(lang) {
  const t = i18n[lang];
  document.getElementById('tagline').textContent = t.tagline;
  document.getElementById('copy').innerHTML = t.copy;
  document.getElementById('btn-dl').innerHTML = t.dl;
  document.getElementById('price-txt').innerHTML = t.price;
  document.getElementById('btn-fb').innerHTML = t.fb;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}
document.querySelectorAll('.lang-btn').forEach(b => b.addEventListener('click', () => setLang(b.dataset.lang)));
function openDl(){document.getElementById('dl-modal').classList.add('open');document.querySelector('#dl-modal input[type=email]').focus();}
function closeDl(){document.getElementById('dl-modal').classList.remove('open');document.getElementById('dl-msg').textContent='';document.getElementById('dl-form').reset();}
function closeDlOut(e){if(e.target===document.getElementById('dl-modal'))closeDl();}
function openFb(){document.getElementById('fb-modal').classList.add('open');}
function closeFb(){document.getElementById('fb-modal').classList.remove('open');document.getElementById('fb-msg').textContent='';document.getElementById('fb-form').reset();}
function closeFbOut(e){if(e.target===document.getElementById('fb-modal'))closeFb();}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDl();closeFb();}});
async function handleDl(e){
  e.preventDefault();const form=e.target;const msg=document.getElementById('dl-msg');const btn=document.getElementById('dl-submit');
  btn.disabled=true;btn.textContent='...';
  try{const res=await fetch(form.action,{method:'POST',body:new FormData(form),headers:{Accept:'application/json'}});
  if(res.ok){window.open('/downloads/gombro-setup.exe','_blank');msg.textContent='Starting download...';form.reset();btn.textContent='✓';}
  else{throw new Error();}}catch{msg.textContent='Something went wrong. Try again.';btn.disabled=false;btn.textContent='Download now';}}
async function handleFb(e){
  e.preventDefault();const form=e.target;const msg=document.getElementById('fb-msg');const btn=document.getElementById('fb-submit');
  btn.disabled=true;btn.textContent='...';
  try{const res=await fetch(form.action,{method:'POST',body:new FormData(form),headers:{Accept:'application/json'}});
  if(res.ok){msg.textContent='Thanks. I will read it.';form.reset();btn.textContent='✓';}
  else{throw new Error();}}catch{msg.textContent='Something went wrong. Try again.';btn.disabled=false;btn.textContent='Send';}}
</script>
</body>
