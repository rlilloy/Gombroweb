<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Proto — Logo + Tagline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;font-family:monospace}
.logo{display:flex;gap:4px;align-items:center;justify-content:center;height:80px}
.letter{font-size:clamp(2.5rem,8vw,4.5rem);font-weight:700;font-family:'Courier New',monospace;letter-spacing:.05em;display:inline-block;transition:opacity 0.25s ease}
.l-0{color:#FCF5E5}.l-1{color:#8B0000}.l-2{color:#a0856b}.l-3{color:#c9b8a8}.l-4{color:#6b2d2d}.l-5{color:#d4c5b0}
.tagline{font-family:'Courier New',monospace;font-size:clamp(.9rem,2.5vw,1.1rem);letter-spacing:.3em;text-transform:uppercase;color:rgba(252,245,229,.55);height:1.8em;display:flex;align-items:center}
.tagline-word{transition:opacity 0.35s ease}
.tagline-word.fade{opacity:0}
</style>
</head>
<body>
<div class="logo" id="logo">
  <span class="letter l-0">G</span>
  <span class="letter l-1">O</span>
  <span class="letter l-2">M</span>
  <span class="letter l-3">B</span>
  <span class="letter l-4">R</span>
  <span class="letter l-5">O</span>
</div>
<div class="tagline">
  <span class="tagline-word" id="tagword">WRITING</span>
</div>
<script>
const WORDS = ['WRITING','REWRITING','INVENTING'];
let wi = 0;
const tagword = document.getElementById('tagword');
setInterval(() => {
  tagword.classList.add('fade');
  setTimeout(() => { wi=(wi+1)%WORDS.length; tagword.textContent=WORDS[wi]; tagword.classList.remove('fade'); }, 370);
}, 2200);

const BASE = ['G','O','M','B','R','O'];
const logo = document.getElementById('logo');
const letters = Array.from(logo.children);
let frozen = false;
let step = 0;
const STEPS = 6;

function getAnagram() {
  const a=[...BASE];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  if(a.join('')==='GOMBRO') a.push(a.shift());
  return a;
}

const iv = setInterval(() => {
  if(frozen){clearInterval(iv);return;}
  step++;
  letters.forEach(l=>l.style.opacity='0');
  setTimeout(() => {
    if(step>=STEPS){BASE.forEach((ch,i)=>letters[i].textContent=ch);frozen=true;}
    else{getAnagram().forEach((ch,i)=>letters[i].textContent=ch);}
    letters.forEach(l=>l.style.opacity='1');
  }, 280);
}, 800);
</script>
</body>
</html>
