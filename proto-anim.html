<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Gombro — Animation Proto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#FCF5E5;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;overflow:hidden}

.scene{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .8s ease}
.scene.active{opacity:1;pointer-events:auto}

/* S1 S2 */
.s-text{font-size:clamp(1rem,3vw,1.4rem);letter-spacing:.04em;text-align:center;max-width:600px;padding:0 24px}
.cursor{display:inline-block;width:.55em;height:1.1em;background:#FCF5E5;vertical-align:middle;margin-left:2px;animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.flicker{animation:flick .15s ease 2.2s 3}
@keyframes flick{0%,100%{opacity:1}50%{opacity:.1}}

/* S3 — editor */
.editor{width:min(560px,90vw);display:flex;flex-direction:column;gap:0}
.editor-line{font-size:clamp(.85rem,2vw,1rem);letter-spacing:.02em;padding:10px 0;border-bottom:1px solid rgba(252,245,229,.08);opacity:0;transition:opacity .6s ease}
.editor-line.main{opacity:1;color:#FCF5E5}
.editor-line.variant{color:rgba(252,245,229,.45);font-size:clamp(.78rem,1.8vw,.9rem)}
.editor-line.variant.show{opacity:1}
.editor-line.selected{color:#FCF5E5;border-left:2px solid #FCF5E5;padding-left:12px}
.editor-line.dimmed{opacity:.18!important}

/* S4 overlay */
.keeps{font-size:clamp(1rem,3vw,1.3rem);letter-spacing:.06em;text-align:center;margin-top:48px;opacity:0;transition:opacity 1s ease}
.keeps.show{opacity:1}

/* S5 logo */
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:28px}
.logo{display:flex;gap:2px}
.letter{font-size:clamp(3rem,10vw,5rem);font-weight:700;letter-spacing:.04em;transition:opacity .22s ease}
.l-0{color:#FCF5E5}.l-1{color:#8B0000}.l-2{color:#a0856b}.l-3{color:#c9b8a8}.l-4{color:#6b2d2d}.l-5{color:#d4c5b0}
.tagline-wrap{font-size:clamp(.75rem,2vw,.95rem);letter-spacing:.28em;text-transform:uppercase;color:rgba(252,245,229,.5);height:1.6em;display:flex;align-items:center;opacity:0;transition:opacity .8s ease}
.tagline-wrap.show{opacity:1}
.tword{transition:opacity .35s ease}
.tword.fade{opacity:0}
</style>
</head>
<body>

<!-- S1 -->
<div class="scene active" id="s1">
  <p class="s-text flicker" id="s1text"></p>
</div>

<!-- S2 -->
<div class="scene" id="s2">
  <p class="s-text" id="s2text"></p>
</div>

<!-- S3 -->
<div class="scene" id="s3">
  <div class="editor" id="editor">
    <div class="editor-line main" id="main-line"><span id="main-typed"></span><span class="cursor" id="main-cur"></span></div>
    <div class="editor-line variant" id="v1"></div>
    <div class="editor-line variant" id="v2"></div>
    <div class="editor-line variant" id="v3"></div>
  </div>
</div>

<!-- S4 -->
<div class="scene" id="s4">
  <div class="editor">
    <div class="editor-line variant dimmed" id="s4v1"></div>
    <div class="editor-line selected" id="s4sel"></div>
    <div class="editor-line variant dimmed" id="s4v2"></div>
  </div>
  <p class="keeps" id="keeps">Gombro keeps them all.</p>
</div>

<!-- S5 -->
<div class="scene" id="s5">
  <div class="logo-wrap">
    <div class="logo" id="logo">
      <span class="letter l-0">G</span>
      <span class="letter l-1">O</span>
      <span class="letter l-2">M</span>
      <span class="letter l-3">B</span>
      <span class="letter l-4">R</span>
      <span class="letter l-5">O</span>
    </div>
    <div class="tagline-wrap" id="tagline-wrap">
      <span class="tword" id="tword">WRITING</span>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);

function show(id){ document.querySelectorAll('.scene').forEach(s=>s.classList.remove('active')); $(id).classList.add('active'); }

// ── helpers ──
function type(el, text, speed, cb) {
  let i = 0;
  const iv = setInterval(() => {
    el.textContent += text[i++];
    if(i >= text.length){ clearInterval(iv); if(cb) cb(); }
  }, speed);
}

// ── S1: "La Mancha of a place." ──
type($('s1text'), 'La Mancha of a place.', 55, () => {
  // flicker then hold
});

// ── S2 ──
setTimeout(() => {
  show('s2');
  type($('s2text'), 'You\'re deleting your best sentences.', 45);
}, 3800);

// ── S3: editor with variants ──
const MAIN = 'He walked into the room and said nothing.';
const VARIANTS = [
  'He entered without a word.',
  'The door opened. He stood there.',
  'He came in, looked around, left.',
];
setTimeout(() => {
  show('s3');
  $('main-cur').style.display = 'inline-block';
  type($('main-typed'), MAIN, 38, () => {
    $('main-cur').style.display = 'none';
    // variants appear one by one
    setTimeout(() => { $('v1').textContent = VARIANTS[0]; $('v1').classList.add('show'); }, 400);
    setTimeout(() => { $('v2').textContent = VARIANTS[1]; $('v2').classList.add('show'); }, 1000);
    setTimeout(() => { $('v3').textContent = VARIANTS[2]; $('v3').classList.add('show'); }, 1700);
  });
}, 7200);

// ── S4: selection ──
setTimeout(() => {
  $('s4v1').textContent = VARIANTS[0];
  $('s4sel').textContent = VARIANTS[1];
  $('s4v2').textContent = VARIANTS[2];
  show('s4');
  setTimeout(() => { $('keeps').classList.add('show'); }, 1200);
}, 13500);

// ── S5: logo + tagline ──
setTimeout(() => {
  show('s5');

  // logo shuffle → freeze
  const BASE = ['G','O','M','B','R','O'];
  const letters = Array.from($('logo').children);
  let step = 0;
  const STEPS = 5;
  let frozen = false;

  function getAnagram() {
    const a=[...BASE];
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    if(a.join('')==='GOMBRO') a.push(a.shift());
    return a;
  }

  const iv = setInterval(() => {
    if(frozen){clearInterval(iv);return;}
    step++;
    letters.forEach(l=>l.style.opacity='0');
    setTimeout(()=>{
      if(step>=STEPS){BASE.forEach((ch,i)=>letters[i].textContent=ch);frozen=true;}
      else{getAnagram().forEach((ch,i)=>letters[i].textContent=ch);}
      letters.forEach(l=>l.style.opacity='1');
    },240);
  }, 750);

  // tagline appears after logo freezes
  setTimeout(() => {
    $('tagline-wrap').classList.add('show');
    const WORDS = ['WRITING','REWRITING','INVENTING'];
    let wi = 0;
    const tw = $('tword');
    setInterval(() => {
      tw.classList.add('fade');
      setTimeout(()=>{ wi=(wi+1)%WORDS.length; tw.textContent=WORDS[wi]; tw.classList.remove('fade'); }, 370);
    }, 2200);
  }, 4500);

}, 17500);
</script>
</body>
</html>
