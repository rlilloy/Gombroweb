<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ARCHIVE_01 | MANUSCRIPT_CORE</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#e2e2e2",
                        "surface": "#131313",
                        "primary": "#ffffff",
                        "background": "#000000"
                    },
                    "fontFamily": {
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes strikethrough {
            from { transform: scaleX(0); }
            to { transform: scaleX(1); }
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes moveToCenter {
            0% { transform: translateY(0); }
            100% { transform: translateY(-60px); }
        }

        @keyframes sceneFade {
            0% { opacity: 0; }
            5% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; }
        }

        .cursor {
            display: inline-block;
            width: 0.6em;
            height: 1.1em;
            background-color: white;
            animation: blink 0.8s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        .type-container {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            width: 0;
            vertical-align: bottom;
        }

        .strike-line {
            position: absolute;
            top: 55%;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: white;
            transform-origin: left;
            transform: scaleX(0);
        }

        /* Master Timeline Logic (22s loop) */
        .master-loop {
            animation: sceneFade 22s ease-in-out infinite;
        }

        /* Line 1: La Mancha of a place. */
        #line-1-text { animation: typing 1.5s steps(20) forwards; animation-delay: 1s; }
        #line-1-strike { animation: strikethrough 0.8s ease-in-out forwards; animation-delay: 3s; }
        #line-1-wrapper { animation: fadeOut 0.6s forwards; animation-delay: 13s; }

        /* Line 2: A place that stains. */
        #line-2-text { animation: typing 1.5s steps(20) forwards; animation-delay: 4.5s; }
        #line-2-strike { animation: strikethrough 0.8s ease-in-out forwards; animation-delay: 6.5s; }
        #line-2-wrapper { animation: fadeOut 0.6s forwards; animation-delay: 13s; }

        /* Line 3: In a village of La Mancha... */
        #line-3-text { animation: typing 2.5s steps(30) forwards; animation-delay: 8.5s; }
        #line-3-wrapper { animation: moveToCenter 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; animation-delay: 14s; }

        /* Line 4: Gombro — inventing the word. */
        #line-4-text { animation: typing 2s steps(25) forwards; animation-delay: 16s; }
        #line-4-wrapper { animation: fadeIn 0s forwards; animation-delay: 16s; } 

        /* Cursor Management */
        #cursor-1-container { animation: fadeOut 0s forwards; animation-delay: 4.5s; }
        
        .cursor-2 { opacity: 0; animation: blink 0.8s infinite; animation-delay: 4.5s; }
        #cursor-2-container { animation: typing 0s forwards, fadeOut 0s forwards; animation-delay: 4.5s, 8.5s; }
        
        .cursor-3 { opacity: 0; animation: blink 0.8s infinite; animation-delay: 8.5s; }
        #cursor-3-container { animation: typing 0s forwards; animation-delay: 8.5s; }

        .cursor-4 { opacity: 0; animation: blink 0.8s infinite; animation-delay: 16s; }
        #cursor-4-container { animation: typing 0s forwards; animation-delay: 16s; }

        body {
            background-color: black;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Strict 9:16 vertical aspect ratio container */
        .viewport-container {
            aspect-ratio: 9 / 16;
            height: 100vh;
            width: auto;
            position: relative;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        @media (max-aspect-ratio: 9/16) {
            .viewport-container {
                width: 100vw;
                height: auto;
            }
        }
    </style>
</head>
<body class="selection:bg-white selection:text-black">
<div class="viewport-container">
<!-- Main Animation Canvas -->
<main class="master-loop w-full px-2 flex flex-col items-center justify-center text-center">
<!-- Discarded Line 1 -->
<div class="relative w-fit" id="line-1-wrapper">
<h1 class="font-mono text-white text-[0.95rem] md:text-[1.1rem] leading-tight tracking-tight whitespace-nowrap">
<span class="type-container" id="line-1-text">La Mancha of a place.</span>
<span class="inline-block" id="cursor-1-container"><span class="cursor"></span></span>
</h1>
<div class="strike-line" id="line-1-strike"></div>
</div>
<!-- Discarded Line 2 -->
<div class="relative w-fit mt-12" id="line-2-wrapper">
<h1 class="font-mono text-white text-[0.95rem] md:text-[1.1rem] leading-tight tracking-tight whitespace-nowrap">
<span class="type-container" id="line-2-text">A place that stains.</span>
<span class="hidden" id="cursor-2-container"><span class="cursor cursor-2"></span></span>
</h1>
<div class="strike-line" id="line-2-strike"></div>
</div>
<!-- Final Content Block -->
<div class="relative flex flex-col items-center gap-12 mt-12">
<!-- Main Phrase -->
<div class="relative w-fit" id="line-3-wrapper">
<h1 class="font-mono text-white text-[0.95rem] md:text-[1.1rem] leading-tight tracking-tight whitespace-nowrap">
<span class="type-container" id="line-3-text">In a village of La Mancha...</span>
<span class="hidden" id="cursor-3-container"><span class="cursor cursor-3" style="opacity: 1;"></span></span>
</h1>
</div>
<!-- Attribution/Sub-line: Slightly larger than before, distinct from main -->
<div class="relative opacity-0" id="line-4-wrapper">
<p class="font-mono text-zinc-400 text-[0.65rem] tracking-[0.1em] uppercase whitespace-nowrap">
<span class="type-container" id="line-4-text">Gombro — inventing the word.</span>
<span class="hidden" id="cursor-4-container"><span class="cursor cursor-4 !h-[1.1em] !w-[0.4em] !bg-zinc-400" style="opacity: 1;"></span></span>
</p>
</div>
</div>
</main>
<!-- Background texture simulation -->
<div class="absolute inset-0 pointer-events-none opacity-[0.03]" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAVwYWOFrFSJ7a_qpPG7WGkEN0yWq-CxXjlwSj8L_R4t9w-__kQ9uBzPjF8uqGhNZQzIp9k3ZTuO1lUvOnbH9hdf7ZckQOYJLVBF2tZbz14zJcQ7MGhENHyMqT_zBOiAzphEtmbnh-FDYWDGl7L-vNJ5mQpoyQrCCbPWZICfR9DjAyA5m_pxn7ZFT4GTmMMNT8T4ouqFmFG6NgarVjwvJWdRaPkpSVRa84EiRkVjQ4X3mMaNljRjoMLcGM_n1-nzuuKBPlaj5aeawAr');">
</div>
</div>
</body></html>
